<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anchor Drag ML</title>
    <script src="js/jquery-3.5.1.min.js"></script>
    <link rel="stylesheet" href="leaflet/leaflet.css" />
    <script src="leaflet/leaflet.js"></script>
    <script src="leaflet/leaflet.rotatedMarker.js"></script>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; font-family: Arial, sans-serif; }
      #layout { display: grid; grid-template-rows: 1fr 240px; height: 100%; }
      #map { width: 100%; height: 100%; }
      #controls {
        border-top: 1px solid #d0d0d0;
        padding: 10px;
        background: #f8f9fb;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .panel { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 8px; font-size: 13px; }
      .row { display: flex; align-items: center; gap: 8px; margin: 6px 0; flex-wrap: wrap; }
      .row label { font-weight: 600; }
      input[type='datetime-local'], select, button, input[type='number'] { font-size: 12px; padding: 4px 6px; }
      #timelineSlider { width: 100%; }
      #labelsList { max-height: 88px; overflow-y: auto; border: 1px solid #e8e8e8; padding: 6px; border-radius: 6px; background: #fafafa; }
      #statusText { color: #555; font-size: 12px; }
      .prediction-high { color: #b42318; font-weight: 700; }
      .small { font-size: 12px; color: #555; }
      #modeBadge {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 900;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.4px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid #c8c8c8;
        background: rgba(255, 255, 255, 0.9);
        color: #1f2937;
      }
      #modeBadge.live {
        border-color: #2b8a3e;
        color: #1f7a35;
      }
      #modeBadge.playback {
        border-color: #0b7285;
        color: #0b7285;
      }
    </style>
  </head>
  <body>
    <div id="layout">
      <div id="map"></div>
      <div id="modeBadge" class="live">LIVE</div>
      <div id="controls">
        <div class="panel">
          <div><strong>Timeline + Labeling</strong></div>
          <div class="row">
            <label>Vessel</label>
            <select id="vesselSelect"></select>
            <span class="small">Retention: <span id="retentionText">-</span>h</span>
          </div>
          <div class="row">
            <label>Start</label><input id="rangeStart" type="datetime-local" />
            <label>End</label><input id="rangeEnd" type="datetime-local" />
            <button id="loadRangeBtn">Load Range</button>
          </div>
          <div class="row">
            <button id="playBtn">Play</button>
            <button id="pauseBtn">Pause</button>
            <button id="liveModeBtn">Go Live</button>
            <span class="small">Cursor: <span id="cursorText">-</span></span>
          </div>
          <div class="row">
            <input id="timelineSlider" type="range" min="0" max="1000" value="0" />
          </div>
          <div class="row">
            <button id="markNormalBtn">Mark Normal Anchored</button>
            <button id="markDraggingBtn">Mark Dragging Event</button>
          </div>
          <div id="statusText">Ready.</div>
        </div>
        <div class="panel">
          <div><strong>Model Operations</strong></div>
          <div class="row">
            <button id="retrainBtn">Retrain Model</button>
            <button id="refreshModelBtn">Refresh Status</button>
          </div>
          <div class="row small">
            <span>Sample window (min)</span>
            <input id="windowMinutes" type="number" min="1" value="10" />
            <button id="predictBtn">Predict Selected Range</button>
          </div>
          <div id="modelStatus" class="small">Model not loaded.</div>
          <div class="small" style="margin-top:8px"><strong>Labels</strong></div>
          <div id="labelsList"></div>
        </div>
      </div>
    </div>

    <script>
      var map = L.map('map', { zoomControl: false }).setView([39.8283, -98.5795], 5)

      var satelliteLayer = L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        {
          attribution:
            'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community',
          maxZoom: 19
        }
      ).addTo(map)

      var osmLayer = L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
          attribution: 'Map data from OpenStreetMap (OSM)',
          maxZoom: 19
        }
      )

      var openSeaLayer = L.tileLayer(
        'http://tiles.openseamap.org/seamark/{z}/{x}/{y}.png',
        {
          attribution: 'Map data from OpenSeaMap',
          maxZoom: 19
        }
      )

      L.control
        .layers(
          {
            OpenStreetMap: osmLayer,
            Satellite: satelliteLayer
          },
          {
            OpenSeaMaps: openSeaLayer
          },
          { position: 'bottomright' }
        )
        .addTo(map)

      var allBuddies = []
      var selectedVessel = null
      var selectedRange = { start: Date.now() - 6 * 3600000, end: Date.now() }
      var playbackTimer = null
      var playbackCursor = selectedRange.start
      var activeTrackLayer = null
      var cursorMarker = null
      var predictionLayers = []
      var timelineTrackLayers = {}
      var timelineCursorMarkers = {}
      var liveTrackLayers = {}
      var selfMarker = null
      var selfMmsi = null
      var hasAutoCentered = false
      var liveTargets = {}
      var viewMode = 'live' // live | playback

      var boatIcon = L.icon({
        iconUrl: 'images/powerboat.png',
        iconSize: [24, 48],
        iconAnchor: [12, 24]
      })

      function setStatus(text) { $('#statusText').text(text) }

      function aisDotColor(status) {
        if (status === 'dragging') return '#c92a2a'
        if (status === 'normal_anchored') return '#e67700'
        return '#2b8a3e'
      }

      function safeId(input) {
        return String(input || '')
          .replace(/[^a-zA-Z0-9_]/g, '_')
          .replace(/_+/g, '_')
          .replace(/^_+|_+$/g, '')
          .toLowerCase()
      }

      function vesselUrnFromTarget(vessel, key) {
        var k = String(key || '')
        if (k.indexOf('urn:') === 0) return k
        if (vessel && vessel.mmsi) return 'urn:mrn:imo:mmsi:' + String(vessel.mmsi)
        return k
      }

      function targetIconForStatus(status) {
        return L.divIcon({
          className: 'bw-ais-icon-wrap',
          html: '<div class="bw-ais-dot" style="background:' + aisDotColor(status) + ';width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.25)"></div>',
          iconSize: [18, 18],
          iconAnchor: [9, 9]
        })
      }

      function ensureLiveTargetMarker(id, lat, lon, name, status) {
        var popup = '<b>' + String(name || id) + '</b><br>Status: ' + String(status || 'normal_anchored')
        if (!liveTargets[id]) {
          liveTargets[id] = L.marker([lat, lon], {
            icon: targetIconForStatus(status),
            rotationOrigin: 'center center'
          })
            .addTo(map)
            .bindPopup(popup)
        } else {
          liveTargets[id].setLatLng([lat, lon])
          liveTargets[id].setIcon(targetIconForStatus(status))
          liveTargets[id].setPopupContent(popup)
          if (!map.hasLayer(liveTargets[id])) liveTargets[id].addTo(map)
        }
      }

      function toLocalInput(ts) {
        var d = new Date(ts)
        d.setMinutes(d.getMinutes() - d.getTimezoneOffset())
        return d.toISOString().slice(0, 16)
      }

      function fromLocalInput(s) {
        var t = new Date(s).getTime()
        return Number.isFinite(t) ? t : null
      }

      function clearPredictionLayers() {
        predictionLayers.forEach(function (layer) { map.removeLayer(layer) })
        predictionLayers = []
      }

      function clearTimelineLayers() {
        Object.keys(timelineTrackLayers).forEach(function (id) {
          map.removeLayer(timelineTrackLayers[id])
          delete timelineTrackLayers[id]
        })
        Object.keys(timelineCursorMarkers).forEach(function (id) {
          map.removeLayer(timelineCursorMarkers[id])
          delete timelineCursorMarkers[id]
        })
      }

      function clearLiveTrackLayers() {
        Object.keys(liveTrackLayers).forEach(function (id) {
          map.removeLayer(liveTrackLayers[id])
          delete liveTrackLayers[id]
        })
      }

      function hideLiveLayers() {
        if (selfMarker && map.hasLayer(selfMarker)) map.removeLayer(selfMarker)
        Object.keys(liveTargets).forEach(function (id) {
          if (map.hasLayer(liveTargets[id])) map.removeLayer(liveTargets[id])
        })
      }

      function showLiveLayers() {
        if (selfMarker && !map.hasLayer(selfMarker)) selfMarker.addTo(map)
        Object.keys(liveTargets).forEach(function (id) {
          if (!map.hasLayer(liveTargets[id])) liveTargets[id].addTo(map)
        })
      }

      function setMode(mode) {
        viewMode = mode === 'playback' ? 'playback' : 'live'
        var badge = $('#modeBadge')
        if (viewMode === 'playback') {
          badge.removeClass('live').addClass('playback').text('PLAYBACK')
          hideLiveLayers()
          renderTimelineAllVessels()
        } else {
          badge.removeClass('playback').addClass('live').text('LIVE')
          clearTimelineLayers()
          showLiveLayers()
          renderLiveTracks()
        }
        setStatus('Mode: ' + viewMode)
      }

      function renderLiveTracks() {
        clearPredictionLayers()
        clearTimelineLayers()
        clearLiveTrackLayers()
        var bounds = []
        var drawn = 0
        allBuddies.forEach(function (v) {
          var points = (v.track || [])
          var latLngs = points
            .filter(function (p) {
              return (
                p &&
                p.position &&
                typeof p.position.latitude === 'number' &&
                Number.isFinite(p.position.latitude) &&
                typeof p.position.longitude === 'number' &&
                Number.isFinite(p.position.longitude)
              )
            })
            .map(function (p) {
              return [p.position.latitude, p.position.longitude]
            })
          if (latLngs.length < 2) return
          var isSelected = selectedVessel && selectedVessel.safeId === v.safeId
          liveTrackLayers[v.safeId] = L.polyline(latLngs, {
            color: isSelected ? '#0b7285' : '#3b82f6',
            weight: isSelected ? 4 : 2.5,
            opacity: isSelected ? 0.95 : 0.72
          }).addTo(map)
          drawn += 1
          bounds = bounds.concat(latLngs)

          // Show persisted buddy markers immediately from state/history, not only live AIS polling.
          var lp = v.lastPosition
          if (lp && typeof lp.latitude === 'number' && typeof lp.longitude === 'number') {
            ensureLiveTargetMarker(
              v.safeId,
              lp.latitude,
              lp.longitude,
              v.name || v.safeId,
              v.latestLabel || v.status || 'normal_anchored'
            )
          }
        })
        if (!hasAutoCentered && bounds.length > 1) {
          map.fitBounds(bounds, { padding: [24, 24] })
          hasAutoCentered = true
        }
        setStatus('Mode: live | buddies: ' + allBuddies.length + ' | tracks drawn: ' + drawn)
      }

      function renderTimelineAllVessels() {
        clearTimelineLayers()
        var bounds = []
        allBuddies.forEach(function (v) {
          var points = (v.track || []).filter(function (p) {
            return p.time >= selectedRange.start && p.time <= selectedRange.end
          })
          var latLngs = points.map(function (p) {
            return [p.position.latitude, p.position.longitude]
          })
          if (latLngs.length >= 2) {
            var isSelected = selectedVessel && selectedVessel.safeId === v.safeId
            timelineTrackLayers[v.safeId] = L.polyline(latLngs, {
              color: isSelected ? '#0b7285' : '#8a8f98',
              weight: isSelected ? 4 : 2,
              opacity: isSelected ? 0.95 : 0.55
            }).addTo(map)
            bounds = bounds.concat(latLngs)
          }
          var cursorPoints = points.filter(function (p) { return p.time <= playbackCursor })
          if (cursorPoints.length) {
            var cp = cursorPoints[cursorPoints.length - 1].position
            timelineCursorMarkers[v.safeId] = L.circleMarker([cp.latitude, cp.longitude], {
              radius: selectedVessel && selectedVessel.safeId === v.safeId ? 6 : 4,
              color: selectedVessel && selectedVessel.safeId === v.safeId ? '#0b7285' : '#555',
              fillColor: selectedVessel && selectedVessel.safeId === v.safeId ? '#0b7285' : '#777',
              fillOpacity: 0.9,
              weight: 1
            }).addTo(map)
            timelineCursorMarkers[v.safeId].bindPopup(
              '<b>' + (v.name || v.safeId) + '</b><br>' + new Date(playbackCursor).toLocaleString()
            )
          }
        })
        if (bounds.length > 1) map.fitBounds(bounds, { padding: [24, 24] })
        $('#cursorText').text(new Date(playbackCursor).toLocaleString())
      }

      function renderTrack() {
        if (viewMode === 'playback') {
          renderTimelineAllVessels()
          return
        }
        renderLiveTracks()
        return
        clearPredictionLayers()
        if (activeTrackLayer) {
          map.removeLayer(activeTrackLayer)
          activeTrackLayer = null
        }
        if (cursorMarker) {
          map.removeLayer(cursorMarker)
          cursorMarker = null
        }
        if (!selectedVessel) return
        var points = (selectedVessel.track || []).filter(function (p) {
          return p.time >= selectedRange.start && p.time <= selectedRange.end
        })
        var latLngs = points.map(function (p) { return [p.position.latitude, p.position.longitude] })
        if (latLngs.length >= 2) {
          activeTrackLayer = L.polyline(latLngs, { color: '#0b7285', weight: 3 }).addTo(map)
          map.fitBounds(activeTrackLayer.getBounds(), { padding: [24, 24] })
        }
        updateCursorMarker()
      }

      function updateCursorMarker() {
        if (viewMode === 'playback') {
          renderTimelineAllVessels()
          return
        }
        if (!selectedVessel) return
        var points = (selectedVessel.track || []).filter(function (p) {
          return p.time <= playbackCursor && p.time >= selectedRange.start && p.time <= selectedRange.end
        })
        if (!points.length) return
        var p = points[points.length - 1].position
        if (!cursorMarker) cursorMarker = L.marker([p.latitude, p.longitude]).addTo(map)
        else cursorMarker.setLatLng([p.latitude, p.longitude])
        $('#cursorText').text(new Date(playbackCursor).toLocaleString())
      }

      function refreshVesselsAndSettings() {
        var historyUrl = '/plugins/anchor-drag-ml/history'
        if (viewMode === 'live') {
          var span = selectedRange.end - selectedRange.start
          var now = Date.now()
          selectedRange.end = now
          selectedRange.start = now - Math.max(60 * 60 * 1000, span || 6 * 3600000)
          $('#rangeStart').val(toLocalInput(selectedRange.start))
          $('#rangeEnd').val(toLocalInput(selectedRange.end))
        } else {
          historyUrl += '?start=' + selectedRange.start + '&end=' + selectedRange.end
        }
        return $.getJSON('/plugins/anchor-drag-ml/settings').then(function (settings) {
          $('#retentionText').text(settings.recordingRetentionHours || '-')
          return $.getJSON(historyUrl)
        }).then(function (data) {
          allBuddies = data.buddies || []
          var select = $('#vesselSelect')
          select.empty()
          allBuddies.forEach(function (b) {
            select.append($('<option>').val(b.safeId).text((b.name || b.safeId) + ' (' + (b.track || []).length + ')'))
          })
          if (!allBuddies.length) {
            selectedVessel = null
            renderTrack()
            return
          }
          var wanted = selectedVessel ? selectedVessel.safeId : allBuddies[0].safeId
          var fallback = allBuddies.find(function (b) { return (b.track || []).length >= 2 }) || allBuddies[0]
          selectedVessel = allBuddies.find(function (b) { return b.safeId === wanted }) || fallback
          select.val(selectedVessel.safeId)
          if (viewMode === 'playback') renderTimelineAllVessels()
          else renderLiveTracks()
        })
      }

      function refreshSelfAndLiveTargets() {
        if (viewMode !== 'live') return
        $.get('/signalk/v1/api/vessels/self', function (self) {
          var pos = self && self.navigation && self.navigation.position && self.navigation.position.value
          if (!pos || typeof pos.latitude !== 'number' || typeof pos.longitude !== 'number') return
          selfMmsi = self.mmsi
          if (!selfMarker) {
            selfMarker = L.marker([pos.latitude, pos.longitude], { icon: boatIcon }).addTo(map)
          } else {
            selfMarker.setLatLng([pos.latitude, pos.longitude])
          }
          if (!hasAutoCentered) {
            map.setView([pos.latitude, pos.longitude], 14)
            hasAutoCentered = true
          }
        })

        $.get('/signalk/v1/api/vessels', function (vessels) {
          var seen = {}
          var statusBySafeId = {}
          allBuddies.forEach(function (b) {
            statusBySafeId[b.safeId] = b
          })

          Object.keys(vessels || {}).forEach(function (key) {
            var vessel = vessels[key]
            if (!vessel || !vessel.navigation || !vessel.navigation.position || !vessel.navigation.position.value) return
            if (selfMmsi && vessel.mmsi == selfMmsi) return
            var p = vessel.navigation.position.value
            if (typeof p.latitude !== 'number' || typeof p.longitude !== 'number') return

            var urn = vesselUrnFromTarget(vessel, key)
            var sid = safeId(urn)
            var b = statusBySafeId[sid]
            var status = b ? (b.latestLabel || b.status || 'normal_anchored') : 'normal_anchored'
            var name = vessel.name && vessel.name.value ? vessel.name.value : (vessel.name || vessel.mmsi || key)
            seen[key] = true

            ensureLiveTargetMarker(key, p.latitude, p.longitude, name, status)
          })

          Object.keys(liveTargets).forEach(function (key) {
            if (!seen[key]) {
              map.removeLayer(liveTargets[key])
              delete liveTargets[key]
            }
          })
        })
      }

      function refreshLabels() {
        return $.getJSON('/plugins/anchor-drag-ml/labels', function (data) {
          var el = $('#labelsList')
          el.empty()
          ;(data.labels || []).slice(0, 40).forEach(function (label) {
            var line = $('<div>')
            line.text(
              label.label + ' | ' + label.safeId + ' | ' +
              new Date(label.startTime).toLocaleString() + ' -> ' +
              new Date(label.endTime).toLocaleString()
            )
            var del = $('<button style="margin-left:8px">Delete</button>')
            del.on('click', function () {
              $.ajax({ url: '/plugins/anchor-drag-ml/labels/' + label.id, type: 'DELETE' }).then(function () {
                refreshLabels()
                setStatus('Deleted label ' + label.id)
              })
            })
            line.append(del)
            el.append(line)
          })
        })
      }

      function refreshModelStatus() {
        return $.getJSON('/plugins/anchor-drag-ml/model/status', function (data) {
          if (!data.hasModel) {
            $('#modelStatus').html('Model not trained. Labels: normal=' + data.classCounts.normal_anchored + ', dragging=' + data.classCounts.dragging_event)
            return
          }
          var m = data.metrics || {}
          $('#modelStatus').html(
            'Trained: ' + new Date(data.trainedAt).toLocaleString() +
            '<br>Samples: ' + (m.sampleCount || 0) +
            '<br>Accuracy: ' + toPct(m.accuracy) +
            ' Precision: ' + toPct(m.precision) +
            ' Recall: ' + toPct(m.recall) +
            ' F1: ' + toPct(m.f1)
          )
        })
      }

      function toPct(v) { return Number.isFinite(v) ? (v * 100).toFixed(1) + '%' : '-' }

      function createLabel(label) {
        if (!selectedVessel) {
          setStatus('Select a vessel first.')
          return
        }
        $.ajax({
          url: '/plugins/anchor-drag-ml/labels',
          type: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({
            safeId: selectedVessel.safeId,
            startTime: selectedRange.start,
            endTime: selectedRange.end,
            label: label
          })
        }).then(function () {
          setStatus('Saved label: ' + label)
          refreshLabels()
        }).fail(function (xhr) {
          setStatus('Failed to save label: ' + (xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : 'unknown'))
        })
      }

      function predictRange() {
        if (!selectedVessel) return
        clearPredictionLayers()
        var windowMs = Math.max(60000, Number($('#windowMinutes').val()) * 60000 || 600000)
        $.getJSON('/plugins/anchor-drag-ml/predictions?vessel=' + encodeURIComponent(selectedVessel.safeId) + '&start=' + selectedRange.start + '&end=' + selectedRange.end + '&windowMs=' + windowMs)
          .then(function (data) {
            ;(data.predictions || []).forEach(function (pred) {
              var points = (selectedVessel.track || []).filter(function (p) { return p.time >= pred.startTime && p.time <= pred.endTime })
              var latLngs = points.map(function (p) { return [p.position.latitude, p.position.longitude] })
              if (latLngs.length < 2) return
              var high = pred.probability >= 0.5
              var layer = L.polyline(latLngs, {
                color: high ? '#c92a2a' : '#2b8a3e',
                weight: high ? 5 : 3,
                opacity: 0.75
              }).addTo(map)
              predictionLayers.push(layer)
            })
            var highs = (data.predictions || []).filter(function (p) { return p.probability >= 0.5 }).length
            setStatus('Predictions loaded. High-risk windows: ' + highs)
          })
          .fail(function (xhr) {
            setStatus('Prediction failed: ' + (xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : 'unknown'))
          })
      }

      function bindUi() {
        $('#rangeStart').val(toLocalInput(selectedRange.start))
        $('#rangeEnd').val(toLocalInput(selectedRange.end))
        $('#timelineSlider').on('input', function () {
          setMode('playback')
          var ratio = Number($(this).val()) / 1000
          playbackCursor = Math.round(selectedRange.start + ratio * (selectedRange.end - selectedRange.start))
          updateCursorMarker()
        })
        $('#vesselSelect').on('change', function () {
          var safeId = $(this).val()
          selectedVessel = allBuddies.find(function (b) { return b.safeId === safeId }) || null
          if (viewMode === 'playback') renderTimelineAllVessels()
          else renderTrack()
        })
        $('#loadRangeBtn').on('click', function () {
          var start = fromLocalInput($('#rangeStart').val())
          var end = fromLocalInput($('#rangeEnd').val())
          if (!start || !end || end <= start) return setStatus('Invalid range')
          selectedRange = { start: start, end: end }
          playbackCursor = start
          setMode('playback')
          refreshVesselsAndSettings().then(function () { refreshLabels() })
          setStatus('Loaded range')
        })
        $('#playBtn').on('click', function () {
          setMode('playback')
          if (playbackTimer) return
          playbackTimer = setInterval(function () {
            playbackCursor += Math.max(1000, (selectedRange.end - selectedRange.start) / 300)
            if (playbackCursor > selectedRange.end) playbackCursor = selectedRange.start
            var ratio = (playbackCursor - selectedRange.start) / Math.max(1, selectedRange.end - selectedRange.start)
            $('#timelineSlider').val(Math.round(ratio * 1000))
            updateCursorMarker()
          }, 150)
        })
        $('#pauseBtn').on('click', function () {
          if (playbackTimer) {
            clearInterval(playbackTimer)
            playbackTimer = null
          }
        })
        $('#liveModeBtn').on('click', function () {
          if (playbackTimer) {
            clearInterval(playbackTimer)
            playbackTimer = null
          }
          setMode('live')
          refreshSelfAndLiveTargets()
        })
        $('#markNormalBtn').on('click', function () { createLabel('normal_anchored') })
        $('#markDraggingBtn').on('click', function () { createLabel('dragging_event') })
        $('#retrainBtn').on('click', function () {
          $.ajax({ url: '/plugins/anchor-drag-ml/model/retrain', type: 'POST' })
            .then(function () {
              setStatus('Model retrained')
              refreshModelStatus()
            })
            .fail(function (xhr) {
              setStatus('Retrain failed: ' + (xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : 'unknown'))
            })
        })
        $('#refreshModelBtn').on('click', function () { refreshModelStatus() })
        $('#predictBtn').on('click', function () { predictRange() })
      }

      bindUi()
      refreshVesselsAndSettings().then(function () {
        refreshLabels()
        refreshModelStatus()
        refreshSelfAndLiveTargets()
        if (viewMode === 'live') renderLiveTracks()
      })
      setInterval(function () {
        refreshVesselsAndSettings()
        refreshSelfAndLiveTargets()
      }, 8000)
    </script>
  </body>
</html>
